{% extends "base.html" %}
{% block content %}

<!-- ==========================================================
     INTERNAL CSS (PREMIUM LOGS DESIGN)
     ========================================================== -->
<style>
    /* Main Container */
    .log-container {
        background: #ffffff;
        border: 1px solid #f1f5f9;
        border-radius: 24px;
        padding: 2.5rem;
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.06);
        animation: fadeIn 0.6s ease-out forwards;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Header Section */
    .log-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid #f1f5f9;
    }

    .log-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1e293b;
        margin: 0;
    }

    .log-subtitle {
        font-size: 0.9rem;
        color: #94a3b8;
        margin-top: 0.25rem;
    }

    /* Download Button */
    .btn-download {
        background: #1e293b;
        color: #fff;
        padding: 10px 24px;
        border-radius: 12px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .btn-download:hover {
        background: #334155;
        color: #fff;
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    /* Table Styling */
    /* Targets the table generated by Pandas */
    .table-responsive {
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #f1f5f9;
    }

    table.dataframe {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 0;
        background: #fff;
    }

    /* Table Header */
    table.dataframe thead th {
        background: #f8fafc;
        color: #475569;
        font-weight: 700;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 16px 20px;
        text-align: left;
        border-bottom: 2px solid #e2e8f0;
        white-space: nowrap;
    }

    /* Table Body */
    table.dataframe tbody tr {
        transition: background-color 0.2s ease;
    }

    /* Zebra Striping */
    table.dataframe tbody tr:nth-child(even) {
        background-color: #f8fafc;
    }

    /* Hover Effect */
    table.dataframe tbody tr:hover {
        background-color: #eff6ff; /* Light blue hover */
    }

    /* Table Cells */
    table.dataframe tbody td {
        padding: 14px 20px;
        color: #334155;
        font-size: 0.95rem;
        border-bottom: 1px solid #f1f5f9;
        vertical-align: middle;
    }

    /* Remove bottom border for last row */
    table.dataframe tbody tr:last-child td {
        border-bottom: none;
    }

    /* Responsive Mobile Adjustments */
    @media (max-width: 768px) {
        .log-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 1rem;
        }
        
        table.dataframe thead th,
        table.dataframe tbody td {
            padding: 12px;
            font-size: 0.85rem;
        }
    }
</style>

<div class="log-container">
    <!-- Header -->
    <div class="log-header">
        <div>
            <h2 class="log-title">Detection Logs</h2>
            <p class="log-subtitle">History of detected traffic signs and risk assessments.</p>
        </div>
        <a href="{{ csv_link }}" class="btn-download" download>
            Export CSV
        </a>
    </div>

    <!-- Table -->
    <div class="table-responsive">
        {{ tables|safe }}
    </div>
</div>

{% endblock %}
