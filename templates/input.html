{% extends "base.html" %}
{% block content %}

<!-- ==========================================================
     INTERNAL CSS (PREMIUM SETTINGS DESIGN)
     ========================================================== -->
<style>
    /* Centering Wrapper */
    .settings-wrapper {
        display: flex;
        justify-content: center;
        padding: 2rem 0;
    }

    /* Premium Card Styling */
    .settings-card {
        background: #ffffff;
        border: 1px solid #f1f5f9;
        border-radius: 24px;
        padding: 3rem;
        width: 100%;
        max-width: 600px; /* Slightly wider for settings */
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.06);
        animation: slideUp 0.6s ease-out forwards;
        position: relative;
        overflow: hidden;
    }

    /* Decorative Element */
    .settings-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 6px;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    }

    /* Animation */
    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .settings-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }

    .settings-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 0.5rem;
    }

    .settings-subtitle {
        color: #94a3b8;
        font-size: 0.95rem;
    }

    /* Section Divider */
    .section-divider {
        display: flex;
        align-items: center;
        margin: 2rem 0 1.5rem 0;
    }
    .section-divider::before, .section-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #f1f5f9;
    }
    .section-divider span {
        color: #6366f1;
        font-weight: 600;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 0 15px;
    }

    /* Form Styles */
    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: #475569;
    }

    .form-control {
        display: block;
        width: 100%;
        padding: 14px 18px;
        font-size: 1rem;
        color: #1e293b;
        background-color: #f8fafc;
        background-clip: padding-box;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        transition: all 0.2s ease;
    }

    .form-control:focus {
        color: #1e293b;
        background-color: #fff;
        border-color: #6366f1;
        outline: 0;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    /* Input Hint */
    .input-hint {
        font-size: 0.8rem;
        color: #94a3b8;
        margin-top: 0.5rem;
    }

    /* Grid for Lat/Lon */
    .coord-grid {
        display: flex;
        gap: 1rem;
    }
    .coord-grid .col {
        flex: 1;
    }

    /* Premium Button */
    .btn-premium {
        width: 100%;
        padding: 14px;
        font-size: 1rem;
        font-weight: 600;
        color: #ffffff;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 14px rgba(99, 102, 241, 0.25);
        margin-top: 2rem;
    }

    .btn-premium:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(99, 102, 241, 0.35);
        color: #fff;
    }
</style>

<div class="settings-wrapper">
    <div class="settings-card">
        <div class="settings-header">
            <h2 class="settings-title">System Settings</h2>
            <p class="settings-subtitle">Configure model paths and API credentials</p>
        </div>

        <form method="POST">
            <!-- Model Section -->
            <div class="section-divider">
                <span>Model Configuration</span>
            </div>

            <div class="form-group">
                <label class="form-label">YOLO Model Path</label>
                <input type="text" name="model_path" class="form-control" value="{{ settings.model_path }}" placeholder="e.g., best.pt">
                <div class="input-hint">Ensure the model file exists in the project root directory.</div>
            </div>

            <!-- API Section -->
            <div class="section-divider">
                <span>Weather Integration</span>
            </div>

            <div class="form-group">
                <label class="form-label">OpenWeather API Key</label>
                <input type="text" name="api_key" class="form-control" value="{{ settings.api_key }}" placeholder="Enter your API Key">
            </div>

            <!-- Location Section -->
            <div class="section-divider">
                <span>Location Coordinates</span>
            </div>

            <div class="coord-grid">
                <div class="col">
                    <div class="form-group">
                        <label class="form-label">Latitude</label>
                        <input type="text" name="lat" class="form-control" value="{{ settings.lat }}">
                    </div>
                </div>
                <div class="col">
                    <div class="form-group">
                        <label class="form-label">Longitude</label>
                        <input type="text" name="lon" class="form-control" value="{{ settings.lon }}">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-premium">Save Settings</button>
        </form>
    </div>
</div>

{% endblock %}
